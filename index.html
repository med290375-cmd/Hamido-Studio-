<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamido Studio | Premium Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --purple: #a855f7; --bg: #050505; --card-bg: #111; }
        * { box-sizing: border-box; transition: 0.3s ease; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        #auth-ui { position: fixed; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-card { background: #080808; border: 1px solid #1a1a1a; padding: 50px; border-radius: 12px; text-align: center; width: 400px; box-shadow: 0 0 50px rgba(168, 85, 247, 0.1); }
        .logo-login { width: 150px; margin-bottom: 25px; border-radius: 8px; border: 1px solid #222; }

        #main-site { display: none; padding-bottom: 50px; }
        header { padding: 60px 20px; text-align: center; background: radial-gradient(circle at 50% 0%, #1a0b2e 0%, transparent 60%); }
        .logo-header { width: 80px; margin-bottom: 15px; border: 1px solid #333; border-radius: 5px; }

        .welcome-msg { margin-top: 10px; font-size: 1.1rem; color: #bbb; letter-spacing: 1px; }
        .user-highlight { color: var(--purple); font-weight: bold; text-transform: uppercase; }

        .container { max-width: 1400px; margin: auto; padding: 0 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        
        .work-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1c; }
        .work-card img { width: 100%; height: 250px; object-fit: cover; filter: brightness(0.9); transition: 0.4s; }
        
        .card-info { padding: 20px; background: #0c0c0d; border-top: 1px solid #1a1a1c; text-align: center; }
        .card-info h3 { margin: 0 0 15px 0; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; color: #eee; }
        .actions { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: 1px solid #222; border-radius: 6px; background: #16161a; color: white; cursor: pointer; font-weight: bold; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { background: #222; border-color: var(--purple); }
        .btn-purple { background: var(--purple); border-color: var(--purple); }
    </style>
</head>
<body>

    <div id="auth-ui">
        <div class="auth-card">
            <img src="ha.png" class="logo-login" onerror="this.src='https://via.placeholder.com/150?text=Logo+Not+Found'">
            <h2 style="letter-spacing: 5px; margin: 0;">HAMIDO STUDIO</h2>
            <button id="login-btn" style="background: #5865F2; color: white; padding: 15px; width: 100%; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 25px;">
                <i class="fab fa-discord"></i> ENTER GALLERY
            </button>
        </div>
    </div>

    <div id="main-site">
        <header>
            <img src="ha.png" class="logo-header">
            <h1 style="letter-spacing: 15px; font-weight: 300; margin: 0;">PRIVATE ASSETS</h1>
            <div id="welcome-text" class="welcome-msg"></div>
        </header>
        <div class="container"><div class="grid" id="portfolio-grid"></div></div>
    </div>

    <script>
        const CLIENT_ID = "1492255954752770189";
        const REDIRECT_URI = "https://med290375-cmd.github.io/Hamido-Studio-/";
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1492252065861341375/egU6kgWvslmT1a8JTUkhRJMiMad5jituT7YBzNnLeEoQ1gg4to7C_0YYfE_YUKKxtHkj";

        let currentUser = null;

        document.getElementById('login-btn').onclick = function() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        };

        const fragment = new URLSearchParams(window.location.hash.slice(1));
        const token = fragment.get('access_token');

        if (token) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';

            fetch('https://discord.com/api/users/@me', {
                headers: { Authorization: `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(user => {
                currentUser = user;
                document.getElementById('welcome-text').innerHTML = `Welcome <span class="user-highlight">${user.username}</span> to our studio!`;
                renderGallery();
            });
        }

        function sendToDiscord(type, workTitle, comment = "") {
            const avatarUrl = `https://cdn.discordapp.com/avatars/${currentUser.id}/${currentUser.avatar}.png`;
            
            let embed = {
                title: type === 'LIKE' ? "❤️ New Like!" : "💬 New Review!",
                color: type === 'LIKE' ? 0xff4b2b : 0xa855f7,
                fields: [
                    { name: "User", value: `**${currentUser.username}**`, inline: true },
                    { name: "Project", value: `\`${workTitle}\``, inline: true }
                ],
                footer: { text: "Hamido Studio | Private Gallery Notifications" },
                timestamp: new Date()
            };

            if (type === 'REVIEW') {
                embed.description = `**Comment:**\n> ${comment}`;
            }

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: "Hamido Studio Bot",
                    avatar_url: "https://med290375-cmd.github.io/Hamido-Studio-/ha.png",
                    embeds: [embed]
                })
            });
        }

        function handleReview(workTitle) {
            const msg = prompt(`What is your review for ${workTitle}?`);
            if (msg) {
                sendToDiscord('REVIEW', workTitle, msg);
                alert("Review sent to Discord!");
            }
        }

        function renderGallery() {
            const works = [
                { t: "HL-RP OFFICIAL V1", i: "HL-RP-PIC-5.png" },
                { t: "BLACK CITY BRAND", i: "HL-RP-PIC-4.png" },
                { t: "DIABLOS RED", i: "diablos-1.png" },
                { t: "TRAPSTAR ROLEPLAY", i: "by-hamido.png" },
                { t: "STUDIO ASSETS", i: "HA-STUDIO-2.png" }
            ];
            const grid = document.getElementById('portfolio-grid');
            works.forEach(w => {
                grid.innerHTML += `
                    <div class="work-card">
                        <img src="${w.i}" onerror="this.src='https://via.placeholder.com/400x250?text=Image+Not+Found'">
                        <div class="card-info">
                            <h3>${w.t}</h3>
                            <div class="actions">
                                <button class="btn" onclick="sendToDiscord('LIKE', '${w.t}'); this.innerHTML='❤️ Liked!'; this.disabled=true;">
                                    <i class="fas fa-heart"></i> Like
                                </button>
                                <button class="btn btn-purple" onclick="handleReview('${w.t}')">
                                    <i class="fas fa-comment"></i> Review
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
