<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamido Studio | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --purple: #a855f7; --bg: #050505; --card-bg: #111; }
        * { box-sizing: border-box; transition: 0.3s ease; cursor: crosshair; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        #auth-ui { position: fixed; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-card { background: #080808; border: 1px solid #1a1a1a; padding: 50px; border-radius: 12px; text-align: center; width: 400px; }
        .btn-discord { background: #5865F2; color: white; text-decoration: none; padding: 15px; border-radius: 6px; font-weight: bold; display: flex; align-items: center; gap: 12px; justify-content: center; margin-top: 25px; cursor: pointer; border: none; width: 100%; }
        #main-site { display: none; padding: 50px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 50px; }
        .work-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1c; padding-bottom: 15px; }
        .work-card img { width: 100%; height: 200px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <div class="auth-card">
            <img src="Hamido Studio (1).png" width="150" style="margin-bottom: 20px;">
            <h2 style="letter-spacing: 5px;">HAMIDO STUDIO</h2>
            <button id="login-btn" class="btn-discord"><i class="fab fa-discord"></i> ENTER GALLERY</button>
        </div>
    </div>

    <div id="main-site">
        <h1>PRIVATE GALLERY</h1>
        <div class="grid" id="portfolio-grid"></div>
    </div>

    <script>
        const CLIENT_ID = "1492255954752770189";
        const REDIRECT_URI = "https://med290375-cmd.github.io/Hamido-Studio-/";
        const WEBHOOK = "https://discord.com/api/webhooks/1492252065861341375/egU6kgWvslmT1a8JTUkhRJMiMad5jituT7YBzNnLeEoQ1gg4to7C_0YYfE_YUKKxtHkj";

        document.getElementById('login-btn').onclick = function() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        };

        const params = new URLSearchParams(window.location.hash.slice(1));
        const token = params.get('access_token');

        if (token) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } })
            .then(res => res.json())
            .then(user => {
                fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: `✅ **${user.username}** logged in!` })
                });
                renderGallery();
            });
        }

        function renderGallery() {
            const works = [
                { t: "HL-RP OFFICIAL", i: "HL RP PIC 5.png" },
                { t: "BLACK CITY", i: "HL RP PIC 4.png" },
                { t: "DIABLOS RED", i: "diablos-1.png" }
            ];
            const grid = document.getElementById('portfolio-grid');
            works.forEach(w => {
                grid.innerHTML += `<div class="work-card"><img src="${w.i}"><h3>${w.t}</h3></div>`;
            });
        }
    </script>
</body>
</html>
